If invoked directly for target-repository work without visible init evidence, run repo-init-gate first and use repo-init-scan only when the gate fails. Return NEEDS_CONTEXT when required scope, files, acceptance checks, or dependencies are missing.

Use current Codex tools and sandbox rules. Do not assume Copilot, VS Code, or Claude-only tools exist. Invoke verification-before-completion before any final completion claim.
